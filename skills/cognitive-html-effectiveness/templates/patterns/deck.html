<div class="deck-wrapper">
$SLIDES_CONTENT
$COMPONENTS_HTML
  <div class="deck-counter" id="deckCounter">1 / 1</div>
</div>

<script>
  (function(){
    var slides = document.querySelectorAll('.deck-slide');
    var counter = document.getElementById('deckCounter');
    var current = 0;

    function show(idx) {
      if (idx < 0) idx = 0;
      if (idx >= slides.length) idx = slides.length - 1;
      slides.forEach(function(s, i){ s.style.display = i === idx ? 'flex' : 'none'; });
      current = idx;
      if (counter) counter.textContent = (current + 1) + ' / ' + slides.length;
    }

    document.addEventListener('keydown', function(e){
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault();
        show(current + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        show(current - 1);
      } else if (e.key === 'Home') {
        e.preventDefault();
        show(0);
      } else if (e.key === 'End') {
        e.preventDefault();
        show(slides.length - 1);
      }
    });

    show(0);
  })();
</script>
