<style>
.tabs {
  border: var(--border);
  border-radius: var(--radius-row);
  background: var(--white);
  margin: 16px 0 8px;
  overflow: hidden;
}
.tabbar {
  display: flex;
  border-bottom: 1px solid var(--gray-300);
  background: var(--gray-100);
  overflow-x: auto;
}
.tabbar button {
  appearance: none; border: none; background: none;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--gray-500);
  padding: 12px 16px;
  cursor: pointer;
  border-right: 1px solid var(--gray-300);
  min-height: var(--space-7);
  flex: 0 0 auto;
}
.tabbar button.on {
  background: var(--white);
  color: var(--slate);
  border-bottom: 2px solid var(--clay);
  margin-bottom: -1px;
}
.tabs pre { display: none; margin: 0; padding: 16px 18px; }
.tabs pre.on { display: block; }
@media (max-width: 640px) {
  .tabs pre { padding: 14px; }
}
</style>
<div class="tabs">
  <div class="tabbar">
$JOIN{tab-button}
  </div>
$JOIN{tab-pane}
  <script>
    (function(){
      var container = document.currentScript.parentElement;
      var btns = container.querySelectorAll('.tabbar button');
      var panes = container.querySelectorAll('pre');
      btns.forEach(function(b){
        b.addEventListener('click', function(){
          btns.forEach(function(x){ x.classList.remove('on'); });
          panes.forEach(function(x){ x.classList.remove('on'); });
          b.classList.add('on');
          panes[+b.dataset.t].classList.add('on');
        });
      });
    })();
  </script>
</div>
