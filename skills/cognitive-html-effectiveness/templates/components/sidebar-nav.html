<style>
.side-nav {
  position: sticky;
  top: 32px;
  align-self: start;
  font-size: 0.8125rem;
}
.side-nav .label {
  font-family: var(--font-mono);
  font-size: 0.625rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-bottom: var(--space-3);
}
.side-nav a {
  display: block;
  padding: 5px 0 5px 12px;
  border-left: 2px solid var(--gray-300);
  color: var(--gray-700);
  text-decoration: none;
}
.side-nav a:hover {
  color: var(--slate);
  border-color: var(--slate);
}
.side-nav .files {
  margin-top: var(--space-6);
  border-top: 1px solid var(--gray-300);
  padding-top: var(--space-4);
}
.side-nav .files code {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  color: var(--gray-500);
  padding: 3px 0;
}
@media (max-width: 920px) {
  .side-nav {
    position: static;
    top: auto;
    padding: 14px 16px;
    border: var(--border);
    border-radius: var(--radius-panel);
    background: var(--white);
  }
  .side-nav a { min-height: var(--space-7); display: flex; align-items: center; }
}
</style>
<nav class="side-nav">
  <div class="label">On this page</div>
$JOIN{sidebar-nav-link}
  <div class="files">
    <div class="label">Files read</div>
$JOIN{sidebar-nav-file}
  </div>
</nav>
